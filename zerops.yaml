# Umami on Zerops — glue config for the umami recipe (buildFromGit).
# Two setups: `prod` (production / stage / simple) and `dev` (agent / CDE).
# Both build identically; only the run lifecycle differs.
zerops:
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        # Pin pnpm 9: umami's lockfile is v9.0 and the default corepack pnpm
        # (11.x) hard-fails CI installs on any package whose build script is
        # not pre-approved (ERR_PNPM_IGNORED_BUILDS). pnpm 9 has no build-gate
        # and runs prisma's postinstall normally. --force overwrites the
        # corepack shim already present in the base image.
        - npm install -g pnpm@9 --force
        # Flat node_modules (hoisted) so the symlink-free tree survives the
        # build -> run container bridge. build-docker = prisma generate +
        # tracker/recorder/geo assets + next build (no DB connection at build).
        - pnpm install --frozen-lockfile --node-linker=hoisted
        - pnpm run build-docker
      deployFiles:
        - .
      cache:
        - node_modules
        - .next/cache
      envVariables:
        # Do NOT set NODE_ENV=production here — pnpm would skip devDependencies
        # (rollup, next, tsup) that build-docker needs. next build emits a
        # production bundle regardless.
        NEXT_TELEMETRY_DISABLED: "1"
        # Cypress is a dev/test-only dep; skip its ~280MB binary download.
        CYPRESS_INSTALL_BINARY: "0"
        # Dummy URL — build-docker never connects; it only needs the var to
        # be a parseable postgres URL (mirrors the official Dockerfile).
        DATABASE_URL: postgresql://user:pass@localhost:5432/dummy
    deploy:
      # Gate traffic on the app actually being ready (DB-backed heartbeat).
      readinessCheck:
        httpGet:
          port: 3000
          path: /api/heartbeat
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        DATABASE_URL: postgresql://${postgresql_user}:${postgresql_password}@postgresql:${postgresql_port}/${postgresql_dbName}
      initCommands:
        # Apply Prisma migrations once per deploy (creates schema + default
        # admin/umami user on a fresh DB). npm puts node_modules/.bin on PATH
        # so check-db's `prisma migrate deploy` resolves; pnpm is absent here.
        - zsc execOnce ${appVersionId} --retryUntilSuccessful -- npm run check-db
      start: npm run start
      healthCheck:
        httpGet:
          port: 3000
          path: /api/heartbeat

  - setup: dev
    build:
      base: nodejs@22
      buildCommands:
        - npm install -g pnpm@9 --force
        - pnpm install --frozen-lockfile --node-linker=hoisted
        - pnpm run build-docker
      deployFiles:
        - .
      cache:
        - node_modules
        - .next/cache
      envVariables:
        NEXT_TELEMETRY_DISABLED: "1"
        CYPRESS_INSTALL_BINARY: "0"
        DATABASE_URL: postgresql://user:pass@localhost:5432/dummy
    run:
      base: nodejs@22
      os: ubuntu
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        DATABASE_URL: postgresql://${postgresql_user}:${postgresql_password}@postgresql:${postgresql_port}/${postgresql_dbName}
      initCommands:
        - zsc execOnce ${appVersionId} --retryUntilSuccessful -- npm run check-db
      # Dev container idles; the agent/developer drives the dev server over SSH.
      start: zsc noop --silent
