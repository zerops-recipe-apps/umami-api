# Umami on Zerops — glue config for the umami recipe (buildFromGit).
# The `db` service is imported with priority 10, so it is up before this
# build runs: the build connects to the real database and `pnpm build`
# applies Prisma migrations at build time (creates schema + default
# admin/umami user). No dummy URL, no migrate-at-init step.
zerops:
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        # pnpm version is pinned via package.json "packageManager"
        # (pnpm 9 — umami's lockfile is v9.0 and pnpm 11's strict build-gate
        # hard-fails CI installs). Flat node_modules survives the build->run
        # container bridge.
        - pnpm install --frozen-lockfile --node-linker=hoisted
        - pnpm run build
      deployFiles:
        - .
      envVariables:
        # Do NOT set NODE_ENV=production here — pnpm would skip devDependencies
        # (rollup, next, tsup) that the build needs.
        NEXT_TELEMETRY_DISABLED: "1"
        # Cypress is a dev/test-only dep; skip its ~280MB binary download.
        CYPRESS_INSTALL_BINARY: "0"
        # Real DB — `db` (priority 10) is already running; `pnpm build` runs
        # `prisma migrate deploy` against it.
        DATABASE_URL: ${db_connectionString}/${db_dbName}
    deploy:
      readinessCheck:
        httpGet:
          port: 3000
          path: /api/heartbeat
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        DATABASE_URL: ${db_connectionString}/${db_dbName}
      start: npm run start
      healthCheck:
        httpGet:
          port: 3000
          path: /api/heartbeat

  - setup: dev
    build:
      base: nodejs@22
      buildCommands:
        - pnpm install --frozen-lockfile --node-linker=hoisted
        - pnpm run build
      deployFiles:
        - .
      envVariables:
        NEXT_TELEMETRY_DISABLED: "1"
        CYPRESS_INSTALL_BINARY: "0"
        DATABASE_URL: ${db_connectionString}/${db_dbName}
    run:
      base: nodejs@22
      os: ubuntu
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        DATABASE_URL: ${db_connectionString}/${db_dbName}
      # Dev container idles; the developer drives the dev server over SSH.
      start: zsc noop --silent
